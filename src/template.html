<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stayListed</title>
</head>
<body>
    <div id="app">
        <header class="app-header">
            <svg class="app-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="3" fill="none" stroke="currentColor" stroke-width="1.75"/>
                <path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M8 12.5l2.5 2.5L16 9"/>
            </svg>
            <span class="app-name">stay<span class="app-name__accent">Listed</span></span>
        </header>

        <nav class="project-rail" aria-label="Projects">
            <ul class="project-list">
                <li>
                    <button type="button" class="project-item project-item--active">
                        <span class="project-item__name">default</span>
                    </button>
                </li>
            </ul>
            <button type="button" class="btn-icon btn-icon--add-project">
                <span>+</span>
                <span class="btn-icon__label">project</span>
            </button>
        </nav>

        <main class="main">
            <header class="main-header">
                <div class="main-header__intro">
                    <p class="main-header__label">Current project</p>
                    <h1 class="main-header__title">default</h1>
                </div>
                <button type="button" class="btn btn--primary">Add task</button>
            </header>

            <div class="main-body">
                <div class="empty-state">
                    <span class="empty-state__mark">—</span>
                    <p class="empty-state__title">No tasks yet</p>
                    <p class="empty-state__text">
                        This board is clear. Hit <strong>Add task</strong> when you are ready.
                    </p>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <p class="app-footer__copy">&copy; 2026 Soikat Saha</p>
            <a
                class="app-footer__github"
                href="https://github.com/soikat27/todo-list"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="View project on GitHub"
            >
                <svg class="app-footer__github-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
                    <path fill="currentColor" d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
                </svg>
            </a>
        </footer>
    </div>
</body>
</html>
